<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    
    <title>DOM</title>
    <style>
        .bg-black{
            background-color: #212121;
            color: #fff;
        }
    </style>
</head>
<body class="bg-black">
    
</body>
<script>
    const div = document.createElement("div")
    div.setAttribute("id", "my-div")
    div.setAttribute("class", "my-class")
    console.log(div) // <div id="my-div" class="my-class"></div>
    div.textContent = "Hello World"
    document.body.appendChild(div)


</script>
</html>
